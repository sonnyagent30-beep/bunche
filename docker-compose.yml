name: bunche-local

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bunche}
      POSTGRES_USER: ${POSTGRES_USER:-bunche}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bunche}
    ports:
      - "5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bunche} -d ${POSTGRES_DB:-bunche}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bunche_local_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_local_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bunche_local_net

  api:
    build:
      context: backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # When network_mode=host (default), the api talks to host services
      # directly on 127.0.0.1. When CHARON_LLM_HOST_NETWORK=0, the api stays
      # in the bunche_local_net bridge and uses hostnames like 'postgres'.
      DATABASE_URL: ${DATABASE_URL_HOST:-postgresql+asyncpg://${POSTGRES_USER:-bunche}:${POSTGRES_PASSWORD:-bunche}@127.0.0.1:5432/${POSTGRES_DB:-bunche}}
      REDIS_URL: ${REDIS_URL_HOST:-redis://127.0.0.1:6379/0}
      # Local provider is default — calls Ollama directly on the host.
      # LiteLLM sidecar exists in compose but is currently disabled (see
      # P1-1 note Jul 22 2026).
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://127.0.0.1:11434}
      CHARON_LLM_PROVIDER: ${CHARON_LLM_PROVIDER:-local}
      MINICPM_MODEL: ${MINICPM_MODEL:-openbmb/minicpm5:latest}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-dev-admin-token}
      FLUTTERWAVE_SECRET_KEY: ${FLUTTERWAVE_SECRET_KEY:-}
      FLUTTERWAVE_PUBLIC_KEY: ${FLUTTERWAVE_PUBLIC_KEY:-}
      FLUTTERWAVE_WEBHOOK_SECRET: ${FLUTTERWAVE_WEBHOOK_SECRET:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@styxproxy.com}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-oyebiyiayomide30@gmail.com}
      CORS_ORIGINS: '["https://styxproxy.com","https://www.styxproxy.com","https://api.styxproxy.com","http://localhost:3000"]'
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      FROM_EMAIL: noreply@styxproxy.com
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/alembic:/app/alembic:ro
      - ./backend/tests:/app/tests:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Reconfigure DB / Redis URLs to use 127.0.0.1 when running with
    # network_mode: host (the api reaches host services directly).
    # If CHARON_LLM_HOST_NETWORK=0 (off), the api still runs in the
    # bunche_local_net bridge and uses the original hostnames.
    network_mode: "${CHARON_LLM_HOST_NETWORK:-host}"

# LiteLLM sidecar intentionally not in this compose right now.
# Config + container image preserved at backend/litellm/ and image
# tag ghcr.io/berriai/litellm:main-stable. Re-enable by uncommenting
# when the upstream-stuck-on-startup bug is diagnosed (P1-1 Jul 22).
#  litellm:
#    image: ghcr.io/berriai/litellm:main-stable
#    restart: unless-stopped
#    ports:
#      - "4000:4000"
#    environment:
#      LITELLM_API_KEY: ${LITELLM_API_KEY:-sk-styxproxy-local-dev-only}
#      DATABASE_URL: ${LITELLM_DATABASE_URL:-}
#    volumes:
#      - ./backend/litellm/config.yaml:/app/config.yaml:ro
#    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]

networks:
  bunche_local_net:
    driver: bridge

volumes:
  postgres_local_data:
  redis_local_data:
